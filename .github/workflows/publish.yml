name: Publish to npm

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read
    id-token: write

concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        name: Publish happy2
        runs-on: ubuntu-latest
        environment: npm
        timeout-minutes: 30

        steps:
            - name: Check out release tag
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0

            - name: Set up pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

            - name: Set up Node.js
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: "24"
                  registry-url: https://registry.npmjs.org
                  package-manager-cache: false

            - name: Verify release tag
              env:
                  RELEASE_TAG: ${{ github.ref_name }}
              run: |
                  PACKAGE_VERSION="$(node --input-type=module -e "import manifest from './package.json' with { type: 'json' }; process.stdout.write(manifest.version)")"
                  test "$RELEASE_TAG" = "v$PACKAGE_VERSION" || {
                    echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION." >&2
                    exit 1
                  }
                  git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
                    echo "Release tag $RELEASE_TAG is not on the main branch." >&2
                    exit 1
                  }

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate release
              run: pnpm run check

            - name: Publish package
              run: npm publish --access public
