[server]
# "all" serves auth and API validation; "auth" only issues tokens; "api" only
# validates them against the shared database.
role = "all"
host = "0.0.0.0"
port = 3000
public_url = "https://rigged.example.com"
# Number of trusted reverse-proxy hops. Set 0 when directly exposed.
trusted_proxy_hops = 1

[database]
# A local file works for one host. Use a shared libSQL endpoint when auth and
# API are independently deployed, so every instance sees the same sessions.
url = "file:/var/lib/rigged/rigged.db"
# auth_token_env = "RIGGED_DATABASE_AUTH_TOKEN"

[jwt]
issuer = "https://rigged.example.com"
audience = "rigged-desktop"
key_id = "2026-01"
# Set paths to use mounted PEM key files. Otherwise the auth/all server
# generates an RS256 key pair on first start and persists it in its .env file.
# The API-only role needs the matching public key in RIGGED_JWT_PUBLIC_KEY_B64
# or public_key_path.
# private_key_path = "/run/secrets/rigged-jwt-private.pem"
# public_key_path = "/run/secrets/rigged-jwt-public.pem"
expiry_days = 30

[auth.password]
enabled = true
# Enable only when self-service account creation is intended.
signup_enabled = false

[auth.magic_link]
enabled = false
from = "Rigged <noreply@rigged.example.com>"
redirect_url = "rigged://auth/magic-link"
# SMTP settings are only read from EMAIL_SMTP_HOST, EMAIL_SMTP_PORT,
# EMAIL_SMTP_USER, EMAIL_SMTP_PASSWORD, and EMAIL_FROM.

[auth.oidc.google]
enabled = false
discovery_url = "https://accounts.google.com/.well-known/openid-configuration"
client_id = "replace-me"
# Name of the environment variable holding this provider's client secret.
client_secret_env = "RIGGED_OIDC_GOOGLE_CLIENT_SECRET"
scopes = ["openid", "email", "profile"]
redirect_path = "/v0/auth/oidc/google/callback"
