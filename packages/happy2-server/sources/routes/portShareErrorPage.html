<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <title>Preview unavailable · Happy</title>
        <style>
            :root {
                color-scheme: light;
                --text: #000000;
                --text-secondary: #49454f;
                --text-link: #2baccc;
                --warning-critical: #ff3b30;
                --surface: #ffffff;
                --surface-high: #f8f8f8;
                --divider: #eaeaea;
                --groupped-background: #f5f5f5;
                --shadow-subtle: rgb(0 0 0 / 0.12);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    color-scheme: dark;
                    --text: #ffffff;
                    --text-secondary: #cac4d0;
                    --text-link: #2baccc;
                    --warning-critical: #ff453a;
                    --surface: #212121;
                    --surface-high: #171717;
                    --divider: #292929;
                    --groupped-background: #1e1e1e;
                    --shadow-subtle: rgb(0 0 0 / 0.32);
                }
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                min-width: 720px;
                min-height: 480px;
                margin: 0;
            }

            body {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                background: var(--groupped-background);
                color: var(--text);
                font-family:
                    ui-rounded,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                font-synthesis: none;
                -webkit-font-smoothing: antialiased;
            }

            header,
            footer {
                flex: 0 0 56px;
                display: flex;
                align-items: center;
                border-color: var(--divider);
                background: var(--surface);
            }

            header {
                border-bottom: 1px solid var(--divider);
            }

            footer {
                justify-content: center;
                border-top: 1px solid var(--divider);
                color: var(--text-secondary);
                font-size: 12px;
                letter-spacing: 0.01em;
            }

            .header-inner {
                width: 100%;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 0 24px;
            }

            .mark {
                width: 28px;
                height: 28px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 8px;
                background: #000000;
                color: #ffffff;
                font-size: 15px;
                font-weight: 750;
                line-height: 1;
            }

            .wordmark {
                font-size: 15px;
                font-weight: 680;
                letter-spacing: -0.01em;
            }

            main {
                flex: 1 1 auto;
                min-height: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 48px 32px;
            }

            article {
                width: 480px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 24px;
                padding: 48px;
                border: 1px solid var(--divider);
                border-radius: 14px;
                background: var(--surface);
                box-shadow: 0 16px 48px var(--shadow-subtle);
                text-align: center;
            }

            .signal {
                width: 96px;
                height: 96px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid var(--divider);
                border-radius: 48px;
                background: var(--surface-high);
                color: var(--warning-critical);
            }

            .signal svg {
                width: 48px;
                height: 48px;
                display: block;
            }

            .copy {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .eyebrow {
                color: var(--warning-critical);
                font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
                font-size: 11px;
                font-weight: 700;
                line-height: 16px;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            h1,
            p {
                margin: 0;
            }

            h1 {
                font-size: 32px;
                font-weight: 720;
                line-height: 40px;
                letter-spacing: -0.035em;
            }

            p {
                max-width: 352px;
                color: var(--text-secondary);
                font-size: 15px;
                line-height: 24px;
            }

            .hint {
                display: flex;
                align-items: center;
                gap: 8px;
                color: var(--text-secondary);
                font-size: 13px;
                line-height: 20px;
            }

            .hint-dot {
                width: 6px;
                height: 6px;
                flex: 0 0 6px;
                border-radius: 3px;
                background: var(--text-link);
            }
        </style>
    </head>
    <body>
        <header>
            <div class="header-inner">
                <div class="mark" aria-hidden="true">H</div>
                <div class="wordmark">Happy</div>
            </div>
        </header>
        <main>
            <article aria-labelledby="error-title" aria-describedby="error-description">
                <div class="signal" aria-hidden="true">
                    <svg viewBox="0 0 48 48" fill="none">
                        <path
                            d="M17 16.5h-4.5a6.5 6.5 0 0 0 0 13H17m14-13h4.5a6.5 6.5 0 0 1 0 13H31M17.5 24h13M24 10v5m0 18v5M10 24H5m38 0h-5"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                        <path
                            d="m20 20-3.5 4 3.5 4m8-8 3.5 4-3.5 4"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </div>
                <div class="copy">
                    <div class="eyebrow">Preview connection interrupted</div>
                    <h1 id="error-title">This preview isn’t available</h1>
                    <p id="error-description">
                        The shared app may still be starting, or its process may have stopped. Open
                        Happy to check that the port is still being shared.
                    </p>
                </div>
                <div class="hint">
                    <span class="hint-dot" aria-hidden="true"></span>
                    <span>You can close this page safely.</span>
                </div>
            </article>
        </main>
        <footer>Secure port preview by Happy</footer>
    </body>
</html>
