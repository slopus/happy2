"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "pnpm install --frozen-lockfile"
run_mode = "concurrent"

[scripts.run.dev]
command = "pnpm dev"
default = true
icon = "play"

[scripts.run.desktop]
command = "PORT=$CONDUCTOR_PORT pnpm dev:desktop"
icon = "monitor"

[scripts.run.ui]
command = "pnpm --filter happy2-ui dev --port $CONDUCTOR_PORT"
icon = "palette"

[scripts.run.web]
command = "pnpm web"
icon = "globe"
available_in = "local"

[scripts.run.test]
command = "pnpm test"
icon = "test-tube"
