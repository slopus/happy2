"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "pnpm install --frozen-lockfile"
run_mode = "concurrent"

[scripts.run.web]
command = "pnpm dev --port $CONDUCTOR_PORT"
default = true
icon = "globe"

[scripts.run.desktop]
command = "PORT=$CONDUCTOR_PORT pnpm dev:desktop"
icon = "monitor"

[scripts.run.test]
command = "pnpm test"
icon = "test-tube"
